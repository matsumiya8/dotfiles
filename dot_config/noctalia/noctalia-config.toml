    id = "g3"
    members = [ "tray", "clipboard", "notes_2", "bluetooth", "notifications", "clock" ]
    opacity = 0.5
    padding = 6.0

[control_center]
hidden_tabs = [ "monitor", "power", "network", "screen-time" ]
width = 730

    [[control_center.shortcuts]]
    type = "nightlight"

