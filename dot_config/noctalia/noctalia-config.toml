thickness = 40
widget_spacing = 8

    [[bar.default.capsule_group]]
    enabled = true
    fill = "surface_variant"
    id = "g1"
    members = [ "tray", "notes", "clipboard", "bluetooth", "notifications", "clock" ]
    opacity = 0.5
    padding = 8.0

    [[bar.default.capsule_group]]
    enabled = true
    fill = "surface_variant"
    id = "g2"
