[bar.default]
background_opacity = 0.89999997988343239
center = [ "group:g2" ]
end = [ "weather", "group:g3" ]
font_family = "IBM Plex Sans JP"
margin_edge = 0
margin_ends = 0
padding = 8
position = "bottom"
radius = 0
scale = 1.0500000081956387
shadow = false
