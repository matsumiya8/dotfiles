[nightlight]
enabled = true
temperature_night = 5000

[osd.kinds]
brightness = false
caffeine = false
dnd = false
keyboard_backlight = false
keyboard_layout = false
lock_keys = false
nightlight = false
power_profile = false
wifi = false

[plugin_settings."nightwatch75/file-search"]
exclude_dirs = "umu, .moc, .gnupg, .mono, .zen, .nuget, .git, node_modules, .cache, .venv"
max_results = 25
show_hidden = true

[plugin_settings."noctalia/notes"]
extension = "txt"
panel_open_near_click = true
panel_placement = "floating"
panel_position = "center_right"

[plugin_settings."noctalia/screen_recorder"]
video_codec = "av1"

[plugin_settings."noctalia/wallhaven"]
api_key = ""
download_dir = ""

[plugin_settings."whyoolw/dropwall"]
copy_to_wallpaper_dir = true
per_monitor = true

[plugins]
enabled = [ "noctalia/notes", "noctalia/timer" ]

[shell]
clipboard_confirm_clear_history = false
clipboard_history_max_entries = 150
font_family = "IBM Plex Sans Medm"
polkit_agent = true
settings_show_advanced = false
show_location = false
ui_scale = 1.0500000081956387

    [shell.animation]
    speed = 1.1000000163912773

    [shell.launcher.providers.calculator]
    prefix = ""

    [shell.launcher.providers.emoji]
    global = false
    prefix = "e"

    [shell.launcher.providers.wallpaper]
    prefix = ""

    [shell.launcher.providers.windows]
    global = true
    prefix = "w"

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_clipboard = true
    open_near_click_control_center = true
    open_near_click_launcher = true
    polkit_placement = "attached"
    polkit_position = "auto"

    [shell.screenshot]
    pipe_command = "cat > \"/bog/Screenshots/$(date +%Y-%m)/$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 7; echo .png)\""
    pipe_to_command = true
    save_to_file = false

    [[shell.session.actions]]
    action = "command"
    command = "pkill -x noctalia"
    countdown_seconds = 0.0
    enabled = true
    glyph = "door-exit"
    label = "Exit"
    shortcut = "e"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "l"
    variant = "default"

    [[shell.session.actions]]
    action = "suspend"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "s"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "r"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    label = "Power Off"
    shortcut = "p"
    variant = "destructive"

[theme]
builtin = "Catppuccin"
community_palette = "Catppuccin Lavender"
mode = "dark"
source = "community"
wallpaper_scheme = "vibrant"

[wallpaper]
enabled = true
fill_mode = "fit"
per_monitor_directories = true
transition = [ "fade" ]
transition_duration = 400

    [wallpaper.default]
    path = "/home/pyne/Pictures/Wallpapers/DP-2/1.jpg"

    [wallpaper.last]
    path = "/home/pyne/.cache/wallpapers/2"

    [wallpaper.monitor.DP-2]
    directory = "/home/pyne/Pictures/Wallpapers/DP-2"

    [wallpaper.monitors.DP-2]
    path = "/home/pyne/.cache/wallpapers/2"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/pyne/.cache/wallpapers/8"

